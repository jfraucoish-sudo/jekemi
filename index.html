<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;">
<title>Jekemi — Control de Papas</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#D94F00;      /* naranja brasa principal */
  --orange2:#FF6B1A;     /* naranja brasa claro */
  --cream:#FDF6EC;       /* fondo crema */
  --cream2:#F5EAD8;      /* crema oscuro para cards */
  --cream3:#EDD9BC;      /* crema más oscuro para bordes/hover */
  --brown:#3D1F00;       /* marrón oscuro para texto */
  --muted:#9A7A5A;       /* marrón medio para subtextos */
  --card:#FFFAF3;        /* card casi blanco crema */
  --red:#C0392B;
  --green:#2E7D32;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--brown);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:var(--brown);border-bottom:4px solid var(--orange);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:48px;height:48px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.logo h1{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--orange2);letter-spacing:2px;line-height:1;}
.logo p{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-family:'Space Mono',monospace;}

/* RELOJ */
.header-right{display:flex;align-items:center;gap:20px;}
.clock-wrap{text-align:right;}
#clock-time{font-family:'Black Han Sans',sans-serif;font-size:38px;color:var(--orange2);letter-spacing:3px;line-height:1;text-shadow:0 0 20px rgba(217,79,0,0.4);}
#clock-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

.live-badge{background:var(--green);color:white;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;font-family:'Space Mono',monospace;display:flex;align-items:center;gap:6px;}
.live-dot{width:7px;height:7px;background:white;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* TICKER */
.ticker{background:var(--orange);padding:7px 0;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;white-space:nowrap;overflow:hidden;color:white;}
.ticker-inner{display:inline-block;animation:tick 55s linear infinite;}
@keyframes tick{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}

/* TABS */
.tabs{display:flex;padding:0 32px;border-bottom:2px solid var(--cream3);background:var(--cream2);}
.tab{padding:14px 20px;background:transparent;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab:hover:not(.active){color:var(--brown);}

main{padding:28px 32px;max-width:1100px;margin:0 auto;}
.page{display:none;animation:fadeIn 0.3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;}
select,input[type=date],input[type=time]{background:var(--card);border:2px solid var(--cream3);color:var(--brown);padding:11px 14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:border-color 0.2s;outline:none;width:100%;}
select:focus,input:focus{border-color:var(--orange);}
select option{background:var(--cream);}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
.form-group{display:flex;flex-direction:column;gap:7px;}

.btn-calc{width:100%;padding:16px;background:var(--orange);color:white;border:none;border-radius:12px;font-family:'Black Han Sans',sans-serif;font-size:19px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-calc:hover{background:var(--brown);color:var(--orange2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(217,79,0,0.3);}

.result-section{display:none;}
.result-section.show{display:block;}
.res-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.res-header h2{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--orange);letter-spacing:1px;}
.badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace;}
.b-plaza{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.b-soacha{background:#fde8e8;color:#991b1b;border:1px solid #fca5a5;}
.b-quinc{background:rgba(217,79,0,0.1);color:var(--orange);border:1px solid rgba(217,79,0,0.3);}
.b-finde{background:rgba(61,31,0,0.08);color:var(--brown);border:1px solid var(--cream3);}

.info-box{background:rgba(217,79,0,0.06);border:1px solid rgba(217,79,0,0.2);border-radius:10px;padding:13px 18px;margin-bottom:20px;font-size:13px;color:var(--brown);line-height:1.6;}
.info-box strong{color:var(--orange);}

.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.rcard{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--cream3);position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
.rcard-day::before{background:linear-gradient(90deg,#2E7D32,#66BB6A);}
.rcard-now::before{background:linear-gradient(90deg,var(--orange),var(--orange2));}
.rcard-8020::before{background:linear-gradient(90deg,var(--red),var(--orange));}
.card-ico{font-size:28px;margin-bottom:8px;}
.card-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:5px;}
.card-val{font-family:'Black Han Sans',sans-serif;font-size:34px;color:var(--orange);line-height:1;}
.card-unit{font-size:13px;color:var(--muted);margin-top:3px;font-family:'Space Mono',monospace;}
.card-sub{font-size:12px;color:var(--muted);margin-top:6px;}

.tl-section{background:var(--card);border-radius:14px;padding:22px;border:1px solid var(--cream3);margin-bottom:20px;box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.tl-title{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:18px;color:var(--brown);}
.tl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.tslot{background:var(--cream2);border-radius:9px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--cream3);}
.tslot.man{border-left-color:var(--orange2);}
.tslot.tar{border-left-color:var(--orange);}
.tslot.actual{border:2px solid var(--green);background:rgba(46,125,50,0.07);border-left-width:2px;}
.tslot.pasado{opacity:0.4;}
.slot-time{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}
.slot-porc{font-size:11px;color:var(--muted);margin-top:2px;}
.slot-kg{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--brown);}
.sb-now{font-size:9px;background:var(--green);color:white;padding:2px 7px;border-radius:8px;margin-top:3px;display:inline-block;}
.sb-nxt{font-size:9px;background:var(--orange);color:white;padding:2px 7px;border-radius:8px;margin-top:3px;display:inline-block;}

.nota{background:var(--cream2);border-left:4px solid var(--orange);border-radius:0 10px 10px 0;padding:13px 17px;font-size:13px;color:var(--brown);line-height:1.6;margin-bottom:20px;}
.nota strong{color:var(--orange);}

.hist-title{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--orange);letter-spacing:1px;}
.hist-sub{font-size:12px;color:var(--muted);margin-bottom:20px;font-family:'Space Mono',monospace;}
.month-block{margin-bottom:28px;}
.month-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:var(--brown);border-radius:10px 10px 0 0;border-bottom:2px solid var(--orange);}
.month-nm{font-family:'Black Han Sans',sans-serif;font-size:17px;letter-spacing:1px;color:var(--orange2);}
.month-st{display:flex;gap:18px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.month-st span{color:var(--orange2);}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card);border-radius:0 0 10px 10px;overflow:hidden;border:1px solid var(--cream3);border-top:none;}
.dh{padding:7px 4px;text-align:center;font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1px;background:var(--cream2);border-bottom:1px solid var(--cream3);text-transform:uppercase;}
.dc{padding:9px 5px;text-align:center;border-right:1px solid var(--cream2);border-bottom:1px solid var(--cream2);}
.dc:nth-child(7n){border-right:none;}
.dc .dn{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:3px;}
.dc .dv{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--brown);}
.dc.we .dv{color:var(--orange);}
.dc.quinc{background:rgba(217,79,0,0.06);}
.dc.quinc .dv{color:var(--orange);}
.dc.empty{opacity:0.2;}

.proy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.proy-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--cream3);box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.proy-card h3{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--orange);letter-spacing:1px;margin-bottom:4px;}
.proy-card .pm{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:14px;}
.proy-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--cream2);}
.proy-row:last-child{border-bottom:none;}
.proy-label{font-size:13px;color:var(--brown);}
.proy-val{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--brown);}

.aj-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.aj-card{background:var(--card);border-radius:14px;padding:22px;border:1px solid var(--cream3);box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.aj-card h3{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--orange);letter-spacing:1px;margin-bottom:3px;}
.aj-card p{font-size:11px;color:var(--muted);margin-bottom:18px;font-family:'Space Mono',monospace;}
.inp-item{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;}
.inp-item label{font-size:13px;color:var(--brown);text-transform:none;letter-spacing:0;flex:1;}
.inp-item input[type=number]{width:90px;text-align:center;padding:8px 10px;font-size:14px;border-radius:8px;background:var(--cream2);border:2px solid var(--cream3);color:var(--brown);outline:none;}
.inp-item input[type=number]:focus{border-color:var(--orange);}
.btn-save{margin-top:14px;width:100%;padding:11px;background:var(--cream2);border:2px solid var(--orange);color:var(--orange);border-radius:9px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
.btn-save:hover{background:var(--orange);color:white;}
.tab-super-only{display:none !important;}
/* CAMBIO DE ACEITE */
.cambio-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
@media(max-width:500px){.cambio-grid{grid-template-columns:1fr;}}
.cambio-card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--cream3);box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.cambio-card h3{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--orange);letter-spacing:1px;margin-bottom:2px;}
.cambio-card .csub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:12px;}
.cambio-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--cream2);}
.cambio-stat:last-of-type{border-bottom:none;}
.cambio-lbl{font-size:12px;color:var(--muted);}
.cambio-val{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--brown);}
.cambio-val.c-ok{color:#2e7d32;}
.cambio-val.c-warn{color:#e65100;}
.cambio-val.c-alert{color:var(--red);}
.dias-chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;margin-top:6px;}
.chip-ok{background:#e8f5e9;color:#2e7d32;}
.chip-warn{background:#fff3e0;color:#e65100;}
.chip-alert{background:#fdecea;color:var(--red);}
.btn-cambio{padding:9px 14px;background:var(--orange);color:white;border:none;border-radius:9px;font-family:'Black Han Sans',sans-serif;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:10px;width:100%;}
.btn-cambio:hover{background:var(--brown);color:var(--orange2);}
.modal-ov{position:fixed;inset:0;background:rgba(61,31,0,0.55);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bx{background:var(--cream);border-radius:16px;padding:26px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-bx h3{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--orange);letter-spacing:1px;margin-bottom:4px;}
.modal-bx p{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:16px;}
.modal-inp{width:100%;padding:10px 14px;border-radius:9px;border:2px solid var(--cream3);background:var(--cream2);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--brown);outline:none;margin-bottom:9px;box-sizing:border-box;}
.modal-inp:focus{border-color:var(--orange);}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.mbtn-ok{flex:1;padding:11px;background:var(--orange);color:white;border:none;border-radius:9px;font-family:'Black Han Sans',sans-serif;font-size:14px;cursor:pointer;}
.mbtn-cancel{flex:1;padding:11px;background:var(--cream2);color:var(--brown);border:2px solid var(--cream3);border-radius:9px;font-family:'Black Han Sans',sans-serif;font-size:14px;cursor:pointer;}
.hist-cambio{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--cream3);margin-top:18px;}
.hist-cambio h4{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--orange);letter-spacing:1px;margin-bottom:10px;}
.hc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:var(--cream2);margin-bottom:5px;font-size:12px;gap:8px;flex-wrap:wrap;}
.hc-fecha{font-family:'Space Mono',monospace;font-weight:700;color:var(--brown);}
.hc-info{color:var(--muted);}
.resumen-box{background:var(--card);border-radius:14px;padding:18px;border:2px solid var(--orange);margin-bottom:20px;}
.resumen-box h3{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--orange);letter-spacing:1px;margin-bottom:12px;}
.resumen-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--cream2);font-size:13px;}
.resumen-row:last-child{border-bottom:none;}
/* SUPERVISOR */
.super-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.super-table th{padding:10px 14px;text-align:left;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;background:var(--cream2);border-bottom:2px solid var(--orange);}
.super-table td{padding:10px 14px;border-bottom:1px solid var(--cream2);vertical-align:top;}
.super-table tr:last-child td{border-bottom:none;}
.super-table tr:hover td{background:rgba(217,79,0,0.03);}
.tag-ok{background:#e8f5e9;color:var(--green);padding:2px 8px;border-radius:6px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;white-space:nowrap;}
.tag-no{background:#fdecea;color:var(--red);padding:2px 8px;border-radius:6px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;white-space:nowrap;}
.tag-nd{background:var(--cream2);color:var(--muted);padding:2px 8px;border-radius:6px;font-size:11px;font-family:'Space Mono',monospace;white-space:nowrap;}
.super-stat{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--cream3);box-shadow:0 2px 8px rgba(61,31,0,0.06);}
.super-stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--orange);}
.super-stat-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px;}

.firma-card{background:var(--card);border-radius:14px;padding:20px;border:2px solid var(--orange);margin-top:20px;box-shadow:0 2px 12px rgba(217,79,0,0.12);}
.firma-card h3{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--orange);letter-spacing:1px;margin-bottom:3px;}
.firma-card p{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:'Space Mono',monospace;}
.firma-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.firma-inp{width:100%;padding:10px 14px;border-radius:9px;border:2px solid var(--cream3);background:var(--cream2);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--brown);outline:none;}
.firma-inp:focus{border-color:var(--orange);}
.firma-inp::placeholder{color:var(--muted);font-weight:400;}
.btn-firma{width:100%;padding:12px;background:var(--brown);color:var(--orange2);border:none;border-radius:9px;font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn-firma:hover{background:var(--orange);color:white;}
.firma-ok{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--green);font-family:'Space Mono',monospace;margin-top:12px;}
/* BLOQUEO */
.bloqueo-banner{background:#fdecea;border:2px solid var(--red);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:none;}
.bloqueo-banner h4{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--red);letter-spacing:1px;margin-bottom:4px;}
.bloqueo-banner p{font-size:12px;color:#7a1010;font-family:'Space Mono',monospace;line-height:1.6;}
.btn-calc:disabled{background:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;opacity:0.6;}

.aceite-card{background:var(--card);border-radius:14px;padding:22px;border:1px solid var(--cream3);box-shadow:0 2px 8px rgba(61,31,0,0.06);margin-bottom:16px;}
.aceite-card h3{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--orange);letter-spacing:1px;margin-bottom:3px;}
.aceite-card p{font-size:11px;color:var(--muted);margin-bottom:16px;font-family:'Space Mono',monospace;}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--cream2);}
.check-row:last-child{border-bottom:none;}
.check-label{font-size:14px;color:var(--brown);flex:1;}
.check-btns{display:flex;gap:8px;}
.cbtn{padding:7px 18px;border-radius:8px;border:2px solid var(--cream3);background:var(--cream2);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.18s;}
.cbtn.si{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.cbtn.no{border-color:var(--red);background:#fdecea;color:var(--red);}
.cbtn:hover{transform:translateY(-1px);}
.freidora-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--cream2);}
.freidora-row:last-child{border-bottom:none;}
.fr-label{font-size:14px;color:var(--brown);font-weight:600;}
.fr-input{width:100%;padding:9px 12px;border-radius:8px;border:2px solid var(--cream3);background:var(--cream2);font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--brown);text-align:center;outline:none;}
.fr-input:focus{border-color:var(--orange);}
.fr-repone{font-family:'Black Han Sans',sans-serif;font-size:18px;text-align:center;}
